<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFO Arena Combat</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .banner { 
            position: fixed; 
            top: 10px; 
            left: 0; 
            right: 0;
            background-color: #f1c40f;
            text-align: center;
            padding: 10px;
            font-size: 2em;
            animation: scrollBanner 10s linear infinite;
        }
        @keyframes scrollBanner {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }
    </style>
</head>
<body>
    <div class="banner">Geebob Incorporate</div>
    <h1>Welcome to UFO Arena Combat!</h1>
    <p>Prepare for an epic battle in the skies.</p>

</body>
</html>
